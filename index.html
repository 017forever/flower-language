<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>花語心情 · Flower Language</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #f7f0f5;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Noto Sans TC', sans-serif;
      padding: 2rem 1rem;
    }

    /* ── 花瓣裝飾背景 ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle at 15% 20%, rgba(176, 90, 138, 0.08) 0%, transparent 40%),
        radial-gradient(circle at 85% 80%, rgba(176, 90, 138, 0.06) 0%, transparent 40%);
      pointer-events: none;
    }

    /* ── 卡片 ── */
    .card {
      background: #ffffff;
      border-radius: 24px;
      padding: 2.5rem 2rem 2rem;
      width: 100%;
      max-width: 380px;
      border: 0.5px solid #e8d5e5;
      position: relative;
      z-index: 1;
    }

    /* ── Logo 區 ── */
    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .logo-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 64px;
      height: 64px;
      background: #fdf0f8;
      border-radius: 50%;
      margin-bottom: 0.75rem;
    }
    .logo-icon svg {
      width: 32px;
      height: 32px;
      fill: none;
      stroke: #b05a8a;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .logo h1 {
      font-family: 'Noto Serif TC', serif;
      font-size: 20px;
      font-weight: 500;
      color: #4a2040;
      margin-bottom: 4px;
    }
    .logo p {
      font-size: 12px;
      color: #9a7090;
      letter-spacing: 0.06em;
    }

    /* ── 分頁按鈕 ── */
    .tabs {
      display: flex;
      background: #f5edf3;
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 1.5rem;
      gap: 4px;
    }
    .tab {
      flex: 1;
      text-align: center;
      padding: 8px 0;
      font-size: 14px;
      font-weight: 500;
      border-radius: 9px;
      cursor: pointer;
      color: #9a7090;
      border: none;
      background: transparent;
      font-family: 'Noto Sans TC', sans-serif;
      transition: all 0.2s ease;
    }
    .tab.active {
      background: #ffffff;
      color: #4a2040;
      border: 0.5px solid #e0cedd;
    }

    /* ── 表單 ── */
    .form-section { display: none; }
    .form-section.active { display: block; }

    .field {
      margin-bottom: 1rem;
    }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #7a5070;
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      padding: 10px 14px;
      border: 0.5px solid #ddc8d8;
      border-radius: 12px;
      font-size: 14px;
      color: #4a2040;
      background: #fdf8fc;
      font-family: 'Noto Sans TC', sans-serif;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
    }
    .field input:focus {
      border-color: #b05a8a;
      background: #ffffff;
    }
    .field input::placeholder { color: #c0a0b8; }

    /* ── 主按鈕 ── */
    .btn-primary {
      width: 100%;
      padding: 12px;
      background: #b05a8a;
      color: #ffffff;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      font-family: 'Noto Sans TC', sans-serif;
      cursor: pointer;
      margin-top: 0.5rem;
      letter-spacing: 0.08em;
      transition: background 0.2s ease, transform 0.1s;
    }
    .btn-primary:hover  { background: #9a4878; }
    .btn-primary:active { transform: scale(0.98); }

    /* ── 訊息提示 ── */
    .msg {
      font-size: 13px;
      border-radius: 10px;
      padding: 9px 12px;
      margin-bottom: 1rem;
      display: none;
    }
    .msg.error   { background: #fdf0f6; color: #c0608a; border: 0.5px solid #f0c0d8; }
    .msg.success { background: #f0fdf5; color: #2a7a50; border: 0.5px solid #b0e8c8; }

    /* ── 底部詩句 ── */
    .quote {
      text-align: center;
      font-size: 12px;
      color: #b090a8;
      margin-top: 1.75rem;
      padding-top: 1.25rem;
      border-top: 0.5px solid #f0e0ec;
      font-family: 'Noto Serif TC', serif;
      font-style: italic;
      line-height: 1.8;
    }

    /* ── 響應式 ── */
    @media (max-width: 420px) {
      .card { padding: 2rem 1.25rem 1.5rem; }
    }
  </style>
</head>
<body>

  <div class="card">

    <!-- Logo -->
    <div class="logo">
      <div class="logo-icon">
        <!-- 手繪風花朵 SVG -->
        <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="16" cy="9"  rx="3.5" ry="5.5" transform="rotate(0   16 16)"/>
          <ellipse cx="16" cy="9"  rx="3.5" ry="5.5" transform="rotate(60  16 16)"/>
          <ellipse cx="16" cy="9"  rx="3.5" ry="5.5" transform="rotate(120 16 16)"/>
          <ellipse cx="16" cy="9"  rx="3.5" ry="5.5" transform="rotate(180 16 16)"/>
          <ellipse cx="16" cy="9"  rx="3.5" ry="5.5" transform="rotate(240 16 16)"/>
          <ellipse cx="16" cy="9"  rx="3.5" ry="5.5" transform="rotate(300 16 16)"/>
          <circle cx="16" cy="16" r="3.5" fill="#b05a8a" stroke="none"/>
        </svg>
      </div>
      <h1>花語心情</h1>
      <p>Flower Language · 用花語記錄心情</p>
    </div>

    <!-- 分頁 -->
    <div class="tabs">
      <button class="tab active" id="tab-login" onclick="switchTab('login')">登入</button>
      <button class="tab" id="tab-register" onclick="switchTab('register')">註冊</button>
    </div>

    <!-- 訊息 -->
    <div class="msg" id="msg"></div>

    <!-- 登入表單 -->
    <div class="form-section active" id="form-login">
      <div class="field">
        <label for="login-user">帳號</label>
        <input type="text" id="login-user" placeholder="請輸入帳號" autocomplete="username" />
      </div>
      <div class="field">
        <label for="login-pass">密碼</label>
        <input type="password" id="login-pass" placeholder="請輸入密碼" autocomplete="current-password" />
      </div>
      <button class="btn-primary" onclick="doLogin()">登入 ✦</button>
    </div>

    <!-- 註冊表單 -->
    <div class="form-section" id="form-register">
      <div class="field">
        <label for="reg-user">帳號</label>
        <input type="text" id="reg-user" placeholder="設定你的帳號" autocomplete="username" />
      </div>
      <div class="field">
        <label for="reg-pass">密碼</label>
        <input type="password" id="reg-pass" placeholder="設定密碼（至少 6 位）" autocomplete="new-password" />
      </div>
      <div class="field">
        <label for="reg-pass2">確認密碼</label>
        <input type="password" id="reg-pass2" placeholder="再次輸入密碼" autocomplete="new-password" />
      </div>
      <button class="btn-primary" onclick="doRegister()">建立帳號 ✦</button>
    </div>

    <p class="quote">「每一朵花，都是情緒的詩。」</p>

  </div>

  <script>
    /* ── 切換分頁 ── */
    function switchTab(t) {
      document.getElementById('tab-login').classList.toggle('active', t === 'login');
      document.getElementById('tab-register').classList.toggle('active', t === 'register');
      document.getElementById('form-login').classList.toggle('active', t === 'login');
      document.getElementById('form-register').classList.toggle('active', t === 'register');
      hideMsg();
    }

    /* ── 訊息顯示 ── */
    function showMsg(text, type) {
      const el = document.getElementById('msg');
      el.textContent = text;
      el.className = 'msg ' + (type || 'error');
      el.style.display = 'block';
    }
    function hideMsg() {
      const el = document.getElementById('msg');
      el.style.display = 'none';
    }

    /* ── 登入 ── */
    function doLogin() {
      const username = document.getElementById('login-user').value.trim();
      const password = document.getElementById('login-pass').value;

      if (!username || !password) {
        showMsg('請填寫帳號和密碼');
        return;
      }

      const users = JSON.parse(localStorage.getItem('fl_users') || '{}');

      if (users[username] && users[username] === password) {
        localStorage.setItem('fl_current', username);
        showMsg('登入成功！歡迎回來，' + username + ' 🌸', 'success');
        setTimeout(() => { window.location.href = 'home.html'; }, 800);
      } else {
        showMsg('帳號或密碼錯誤，請再試一次');
      }
    }

    /* ── 註冊 ── */
    function doRegister() {
      const username = document.getElementById('reg-user').value.trim();
      const password = document.getElementById('reg-pass').value;
      const confirm  = document.getElementById('reg-pass2').value;

      if (!username || !password || !confirm) {
        showMsg('請填寫所有欄位');
        return;
      }
      if (username.length < 2) {
        showMsg('帳號至少需要 2 個字元');
        return;
      }
      if (password.length < 6) {
        showMsg('密碼至少需要 6 位');
        return;
      }
      if (password !== confirm) {
        showMsg('兩次密碼不一致，請重新確認');
        return;
      }

      const users = JSON.parse(localStorage.getItem('fl_users') || '{}');

      if (users[username]) {
        showMsg('此帳號已被使用，請換一個');
        return;
      }

      users[username] = password;
      localStorage.setItem('fl_users', JSON.stringify(users));
      showMsg('註冊成功！請切換至登入頁面 🌷', 'success');

      // 自動切換回登入
      setTimeout(() => {
        switchTab('login');
        document.getElementById('login-user').value = username;
      }, 1200);
    }

    /* ── Enter 鍵支援 ── */
    document.addEventListener('keydown', function(e) {
      if (e.key !== 'Enter') return;
      const loginActive = document.getElementById('form-login').classList.contains('active');
      if (loginActive) doLogin();
      else doRegister();
    });

    /* ── 檢查是否已登入（選用）── */
    // if (localStorage.getItem('fl_current')) {
    //   window.location.href = 'home.html';
    // }
  </script>

</body>
</html>
